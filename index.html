const SourceBadge = ({ source, year, confidence }) => (
  <span style={{ display: "inline-flex", alignItems: "center", gap: 4, fontSize: 10, color: COLORS.textDim, background: "rgba(59,130,246,0.08)", padding: "2px 8px", borderRadius: 4, fontFamily: "monospace" }}>
    {source} · {year}
    {confidence && <span style={{ width: 6, height: 6, borderRadius: "50%", background: confidence === "Alta" ? COLORS.green : confidence === "Média" ? COLORS.gold : COLORS.red, display: "inline-block" }} />}
  </span>
);

const SectionTitle = ({ children, sub }) => (
  <div style={{ marginBottom: 32 }}>
    <h2 style={{ fontSize: 28, fontWeight: 700, color: COLORS.text, letterSpacing: "-0.02em", fontFamily: "'Plus Jakarta Sans', sans-serif" }}>{children}</h2>
    {sub && <p style={{ fontSize: 14, color: COLORS.textDim, marginTop: 6, maxWidth: 700 }}>{sub}</p>}
  </div>
);

const InsightBox = ({ children, type = "info" }) => {
  const colors = { info: COLORS.accent, warning: COLORS.gold, critical: COLORS.red, positive: COLORS.green };
  return (
    <div style={{ background: `${colors[type]}11`, borderLeft: `3px solid ${colors[type]}`, padding: "12px 16px", borderRadius: "0 6px 6px 0", fontSize: 13, color: COLORS.textMuted, lineHeight: 1.6, marginTop: 12 }}>
      {children}
    </div>
  );
};

const StatCard = ({ value, label, sub, delta, source, year }) => (
  <div style={{ background: COLORS.card, border: `1px solid ${COLORS.border}`, borderRadius: 10, padding: "20px 18px", display: "flex", flexDirection: "column", gap: 6 }}>
    <div style={{ fontSize: 26, fontWeight: 800, color: COLORS.text, fontFamily: "'Plus Jakarta Sans', sans-serif", letterSpacing: "-0.03em" }}>{value}</div>
    <div style={{ fontSize: 13, fontWeight: 600, color: COLORS.textMuted }}>{label}</div>
    {sub && <div style={{ fontSize: 11, color: COLORS.textDim }}>{sub}</div>}
    {delta && <div style={{ fontSize: 11, color: delta > 0 ? COLORS.green : COLORS.red, fontWeight: 600 }}>{delta > 0 ? "+" : ""}{delta}%</div>}
    <SourceBadge source={source} year={year} />
  </div>
);

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: COLORS.tooltipBg, border: "1px solid " + COLORS.accent, borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#FFFFFF" }}>
      <div style={{ fontWeight: 700, marginBottom: 6 }}>{label}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2 }}>
          <span style={{ width: 8, height: 8, borderRadius: "50%", background: p.color }} />
          <span style={{ color: "#C4BDE8" }}>{p.name}:</span>
          <span style={{ fontWeight: 600 }}>{typeof p.value === "number" ? p.value.toLocaleString("pt-BR") : p.value}</span>
        </div>
      ))}
    </div>
  );
};

          { title: "Ocorrências não rastreadas", desc: "Devoluções, avarias e extravios sem registro sistemático. Sem dados, não há como cobrar transportadora ou melhorar processos.", icon: "⚠️", severity: "warning" },
          { title: "Retrabalho documental", desc: "5-8 documentos por operação, majoritariamente manuais. Erros de digitação geram rejeição fiscal e retrabalho de horas.", icon: "📄", severity: "critical" },
          { title: "Falta de integração", desc: "ERP, WMS, TMS, rastreador e planilha não conversam. Dados ficam em silos. Decisão operacional é baseada em feeling, não em dados.", icon: "🔌", severity: "warning" },
          { title: "Auditoria manual", desc: "Conferência de frete vs. tabela contratada feita manualmente. Cobranças indevidas passam despercebidas. Economia típica: 5-10% do gasto.", icon: "🔍", severity: "warning" },
          { title: "Baixa visibilidade", desc: "Embarcador não sabe onde a carga está em tempo real. Transportadora não tem SLA mensurado. Ocorrência vira surpresa.", icon: "👁️", severity: "info" },
        ].map((item, i) => (
          <div key={i} style={{ background: COLORS.card, borderRadius: 8, padding: 16, border: `1px solid ${COLORS.border}`, borderLeft: `3px solid ${item.severity === "critical" ? COLORS.red : item.severity === "warning" ? COLORS.gold : COLORS.accent}` }}>
            <div style={{ fontSize: 20, marginBottom: 8 }}>{item.icon}</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.text, marginBottom: 6 }}>{item.title}</div>
            <div style={{ fontSize: 12, color: COLORS.textDim, lineHeight: 1.6 }}>{item.desc}</div>
          </div>
        ))}
      </div>
    </div>
  );

  // ── DOCUMENTOS ──
  const renderDocumentos = () => (
    <div>
      <SectionTitle sub="Uma operação simples de transporte gera 5-8 documentos fiscais. Com 440 milhões de pedidos/ano, são 2,2-3,5 bilhões de documentos anuais.">Jornada Documental — Do pedido ao pagamento</SectionTitle>

      <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 40 }}>
        {DOC_JOURNEY.map((step, i) => (
          <div key={i} style={{ background: COLORS.card, borderRadius: 10, padding: 20, border: `1px solid ${COLORS.border}`, display: "grid", gridTemplateColumns: "40px 1fr 1fr 1fr 1fr", gap: 16, alignItems: "center" }}>
            <div style={{ width: 36, height: 36, borderRadius: "50%", background: `${COLORS.accent}22`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14, fontWeight: 800, color: COLORS.accentLight }}>
              {step.step}
            </div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text }}>{step.name}</div>
              <div style={{ fontSize: 11, color: COLORS.textDim }}>{step.doc}</div>
            </div>
            <div>
              <div style={{ fontSize: 10, fontWeight: 600, color: COLORS.red, marginBottom: 2 }}>Risco</div>
              <div style={{ fontSize: 11, color: COLORS.textDim }}>{step.risk}</div>
            </div>
            <div>
              <div style={{ fontSize: 10, fontWeight: 600, color: COLORS.green, marginBottom: 2 }}>Automação possível</div>
              <div style={{ fontSize: 11, color: COLORS.textDim }}>{step.auto}</div>
            </div>
            <div>
              <div style={{ fontSize: 10, fontWeight: 600, color: COLORS.accentLight, marginBottom: 2 }}>Papel do TMS</div>
              <div style={{ fontSize: 11, color: COLORS.textDim }}>{step.tms}</div>
            </div>
          </div>
        ))}
      </div>

      <InsightBox type="critical">
        São 10 etapas, cada uma com documentos, riscos e integrações. Uma empresa com 5.000 entregas/mês gera ~40.000 documentos/mês. Sem automação, são centenas de horas de trabalho manual, erros de digitação, rejeições fiscais e pagamentos indevidos. O TMS não é software — é a infraestrutura mínima para operar sem sangrar.
      </InsightBox>
    </div>
  );

  // ── COMPARE SUA OPERAÇÃO ──
  const safeNum = (val) => { const n = Number(val); return isNaN(n) ? 0 : n; };

  const handleInput = (field, rawVal) => {
    if (field === "usaTMS") {
      setUserInputs((prev) => ({ ...prev, usaTMS: rawVal }));
    } else {
      setUserInputs((prev) => ({ ...prev, [field]: rawVal === "" ? "" : safeNum(rawVal) }));
    }
  };

  const renderCompare = () => {
    const entregas = safeNum(userInputs.entregas);
    const transportadoras = safeNum(userInputs.transportadoras);
    const freteSpot = safeNum(userInputs.freteSpot);
    const documentos = safeNum(userInputs.documentos);
    const ocorrencias = safeNum(userInputs.ocorrencias);
    const pessoasOp = safeNum(userInputs.pessoasOp);
    const usaTMS = userInputs.usaTMS;

    const docsEstimado = entregas * 6;
    const horasManualMes = usaTMS ? (documentos * 0.5) / 60 : (documentos * 3) / 60;
    const potencialEconomia = !usaTMS ? entregas * 2.8 : entregas * 0.8;

    // Complexity score — each factor normalized 0→1, then weighted (sum of weights = 100)
    const fVolume = entregas > 0 ? Math.min(1, Math.log(1 + entregas) / Math.log(1 + 50000)) : 0;   // log scale, ceiling 50k
    const fFrag = Math.min(1, transportadoras / 50);                                                   // linear, ceiling 50
    const fSpot = Math.min(1, freteSpot / 100);                                                        // direct %
    const fOcorr = Math.min(1, ocorrencias / 20);                                                      // ceiling 20%
    const fEquipe = Math.min(1, pessoasOp / 25);                                                       // ceiling 25 pessoas
    const fSemTMS = usaTMS ? 0 : 1;                                                                    // binary

    const complexityScore = Math.max(0, Math.min(100, Math.round(
      fVolume * 20 +     // peso 20: volume de operações
      fFrag * 15 +       // peso 15: fragmentação de parceiros
      fSpot * 15 +       // peso 15: exposição a frete spot
      fOcorr * 20 +      // peso 20: taxa de problemas
      fEquipe * 10 +     // peso 10: tamanho da equipe
      fSemTMS * 20       // peso 20: ausência de TMS
    )));
    // Calibragem: 500 entregas, 3 transp, 10% spot, com TMS → ~17
    //             5.000 entregas, 10 transp, 30% spot, sem TMS → ~51
    //             30.000 entregas, 40 transp, 60% spot, sem TMS → ~80

    const maturityLevel = usaTMS
      ? (complexityScore < 25 ? 4 : complexityScore < 50 ? 3 : 2)
      : (complexityScore < 35 ? 2 : 1);

    const maturityLabels = {
      1: { label: "Operação Manual", color: COLORS.red, desc: "Sem TMS e complexidade elevada. Documentos manuais, sem visibilidade em tempo real, sem auditoria automatizada. Risco operacional e financeiro alto." },
      2: { label: "Operação Controlada", color: COLORS.gold, desc: "Algum nível de controle, mas com lacunas. Planilhas, processos semi-manuais, visibilidade parcial. Próximo passo: centralizar e automatizar." },
      3: { label: "Operação Integrada", color: COLORS.accentLight, desc: "TMS em uso, complexidade gerenciável. Integração com ERP parcial ou completa. Oportunidade de otimização via dados e automação avançada." },
      4: { label: "Operação Analítica", color: COLORS.green, desc: "TMS integrado, operação enxuta. Dados disponíveis para decisão. Próximo passo: IA, predição de demanda e automação inteligente." },
    };

    const mat = maturityLabels[maturityLevel];

    // Comparison bar data — your operation vs market benchmark
    const comparisonBars = [
      { metric: "Entregas/mês", voce: Math.min(100, (entregas / 10000) * 100), mercado: 50, raw: entregas.toLocaleString("pt-BR"), ref: "~5.000 (média embarcador médio)" },
      { metric: "Transportadoras", voce: Math.min(100, (transportadoras / 20) * 100), mercado: 50, raw: String(transportadoras), ref: "~10 (média mercado)" },
      { metric: "Frete Spot %", voce: Math.min(100, freteSpot), mercado: 40, raw: freteSpot + "%", ref: "~40% (média mercado)" },
      { metric: "Ocorrências %", voce: Math.min(100, ocorrencias * 10), mercado: 30, raw: ocorrencias + "%", ref: "~3% (benchmark)" },
      { metric: "Equipe (pessoas)", voce: Math.min(100, (pessoasOp / 15) * 100), mercado: 50, raw: String(pessoasOp), ref: "~8 (média)" },
      { metric: "Docs/mês", voce: Math.min(100, (documentos / 50000) * 100), mercado: 40, raw: documentos.toLocaleString("pt-BR"), ref: "~30.000 (média)" },
    ];

    const inputStyle = { width: "100%", padding: "10px 12px", background: COLORS.inputBg, border: "1px solid " + COLORS.border, borderRadius: 6, color: COLORS.text, fontSize: 14, outline: "none" };
    const labelStyle = { fontSize: 12, fontWeight: 600, color: COLORS.textMuted, marginBottom: 4, display: "block" };

    const CompareBar = ({ label, yourPct, marketPct, yourRaw, marketRef }) => {
      const yp = Math.max(0, Math.min(100, yourPct || 0));
      const mp = Math.max(0, Math.min(100, marketPct || 0));
      return (
        <div style={{ marginBottom: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
            <span style={{ fontSize: 12, fontWeight: 600, color: COLORS.textMuted }}>{label}</span>
            <span style={{ fontSize: 11, color: COLORS.textDim }}>Você: <strong style={{ color: COLORS.text }}>{yourRaw}</strong> · Mercado: {marketRef}</span>
          </div>
          <div style={{ position: "relative", height: 20, background: COLORS.inputBg, borderRadius: 4, overflow: "hidden" }}>
            <div style={{ position: "absolute", top: 0, left: 0, height: "100%", width: mp + "%", background: COLORS.gold + "44", borderRadius: 4, transition: "width 0.5s ease" }} />
            <div style={{ position: "absolute", top: 0, left: 0, height: "100%", width: yp + "%", background: yp > mp ? COLORS.red + "cc" : COLORS.accent + "cc", borderRadius: 4, transition: "width 0.5s ease" }} />
            <div style={{ position: "absolute", top: 0, left: mp + "%", width: 2, height: "100%", background: COLORS.gold, zIndex: 2 }} />
          </div>
          <div style={{ display: "flex", gap: 12, marginTop: 3, fontSize: 10 }}>
            <span style={{ color: yp > mp ? COLORS.red : COLORS.accent }}>■ Sua operação</span>
            <span style={{ color: COLORS.gold }}>│ Média mercado</span>
            {yp > mp * 1.3 && <span style={{ color: COLORS.red, fontWeight: 600 }}>⚠ Acima do benchmark</span>}
          </div>
        </div>
      );
    };

    return (
      <div>
        <SectionTitle sub="Coloque os dados da sua operação e veja como ela se compara com as médias do mercado brasileiro. Todos os cálculos são em tempo real.">Compare sua Operação com o Mercado</SectionTitle>

        <div style={{ display: "grid", gridTemplateColumns: "340px 1fr", gap: 24, marginBottom: 40 }}>
          {/* LEFT: Inputs */}
          <div style={{ background: COLORS.card, borderRadius: 12, padding: 24, border: "1px solid " + COLORS.border }}>
            <h3 style={{ fontSize: 16, fontWeight: 700, color: COLORS.text, marginBottom: 20 }}>Dados da sua operação</h3>

            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              {[
                { key: "entregas", label: "Entregas por mês", placeholder: "Ex: 5000" },
                { key: "transportadoras", label: "Transportadoras ativas", placeholder: "Ex: 10" },
                { key: "freteSpot", label: "% Frete spot", placeholder: "Ex: 30", min: 0, max: 100 },
                { key: "documentos", label: "Documentos emitidos/mês", placeholder: "Ex: 15000" },
                { key: "ocorrencias", label: "% de ocorrências", placeholder: "Ex: 5", min: 0, max: 100 },
                { key: "pessoasOp", label: "Pessoas na operação", placeholder: "Ex: 8" },
              ].map((field) => (
                <div key={field.key}>
                  <label style={labelStyle}>{field.label}</label>
                  <input
                    type="number"
                    value={userInputs[field.key]}
                    placeholder={field.placeholder}
                    min={field.min}
                    max={field.max}
                    onChange={(e) => handleInput(field.key, e.target.value)}
                    style={inputStyle}
                    onFocus={(e) => e.target.style.borderColor = COLORS.accent}
                    onBlur={(e) => e.target.style.borderColor = COLORS.border}
                  />
                </div>
              ))}
              <div>
                <label style={labelStyle}>Usa TMS hoje?</label>
                <div style={{ display: "flex", gap: 8 }}>
                  {[true, false].map((val) => (
                    <button key={String(val)} onClick={() => handleInput("usaTMS", val)} style={{
                      flex: 1, padding: 10, borderRadius: 6, cursor: "pointer", fontWeight: 600, fontSize: 13,
                      border: "1px solid " + (usaTMS === val ? (val ? COLORS.green : COLORS.red) : COLORS.border),
                      background: usaTMS === val ? (val ? COLORS.green + "22" : COLORS.red + "22") : "transparent",
                      color: usaTMS === val ? (val ? COLORS.green : COLORS.red) : COLORS.textDim,
                    }}>
                      {val ? "Sim" : "Não"}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {/* RIGHT: Results */}
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {/* Score + Maturity */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
              <div style={{ background: COLORS.card, borderRadius: 10, padding: 24, border: "2px solid " + mat.color, textAlign: "center" }}>
                <div style={{ fontSize: 56, fontWeight: 800, color: mat.color, lineHeight: 1 }}>{complexityScore}</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: COLORS.text, marginTop: 8 }}>Score de Complexidade</div>
                <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 4 }}>0 = simples · 100 = crítico</div>
                <div style={{ marginTop: 12, height: 6, background: COLORS.inputBg, borderRadius: 3, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: complexityScore + "%", background: mat.color, borderRadius: 3, transition: "width 0.5s ease" }} />
                </div>
              </div>
              <div style={{ background: COLORS.card, borderRadius: 10, padding: 24, border: "1px solid " + mat.color }}>
                <div style={{ fontSize: 11, fontWeight: 600, color: COLORS.textDim, textTransform: "uppercase", letterSpacing: "0.05em", marginBottom: 8 }}>Diagnóstico</div>
                <div style={{ fontSize: 20, fontWeight: 800, color: mat.color, marginBottom: 8 }}>Nível {maturityLevel}</div>
                <div style={{ fontSize: 15, fontWeight: 700, color: COLORS.text, marginBottom: 8 }}>{mat.label}</div>
                <div style={{ fontSize: 12, color: COLORS.textDim, lineHeight: 1.6 }}>{mat.desc}</div>
              </div>
            </div>

            {/* Factor Breakdown */}
            <div style={{ background: COLORS.card, borderRadius: 10, padding: 20, border: "1px solid " + COLORS.border }}>
              <h3 style={{ fontSize: 13, fontWeight: 600, color: COLORS.textMuted, marginBottom: 14 }}>O que compõe o score — contribuição de cada fator</h3>
              {[
                { label: "Volume de operações", raw: entregas.toLocaleString("pt-BR") + " entregas", pct: fVolume, weight: 20, points: Math.round(fVolume * 20) },
                { label: "Fragmentação (transportadoras)", raw: transportadoras + " parceiros", pct: fFrag, weight: 15, points: Math.round(fFrag * 15) },
                { label: "Exposição a frete spot", raw: freteSpot + "%", pct: fSpot, weight: 15, points: Math.round(fSpot * 15) },
                { label: "Taxa de ocorrências", raw: ocorrencias + "%", pct: fOcorr, weight: 20, points: Math.round(fOcorr * 20) },
                { label: "Tamanho da equipe", raw: pessoasOp + " pessoas", pct: fEquipe, weight: 10, points: Math.round(fEquipe * 10) },
                { label: "Ausência de TMS", raw: usaTMS ? "Usa TMS" : "Sem TMS", pct: fSemTMS, weight: 20, points: Math.round(fSemTMS * 20) },
              ].map((f, i) => (
                <div key={i} style={{ display: "grid", gridTemplateColumns: "180px 100px 1fr 50px", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <span style={{ fontSize: 12, color: COLORS.textMuted }}>{f.label}</span>
                  <span style={{ fontSize: 11, color: COLORS.textDim }}>{f.raw}</span>
                  <div style={{ height: 8, background: COLORS.inputBg, borderRadius: 4, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: (f.pct * 100) + "%", background: f.pct > 0.6 ? COLORS.red : f.pct > 0.3 ? COLORS.gold : COLORS.accent, borderRadius: 4, transition: "width 0.4s ease" }} />
                  </div>
                  <span style={{ fontSize: 12, fontWeight: 700, color: f.points >= f.weight * 0.6 ? COLORS.red : f.points >= f.weight * 0.3 ? COLORS.gold : COLORS.green, textAlign: "right" }}>+{f.points}</span>
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8, paddingTop: 8, borderTop: "1px solid " + COLORS.border }}>
                <span style={{ fontSize: 13, fontWeight: 800, color: mat.color }}>Total: {complexityScore} / 100</span>
              </div>
            </div>

            {/* Comparison Bars */}
            <div style={{ background: COLORS.card, borderRadius: 10, padding: 24, border: "1px solid " + COLORS.border }}>
              <h3 style={{ fontSize: 14, fontWeight: 600, color: COLORS.textMuted, marginBottom: 20 }}>Sua Operação vs Média do Mercado</h3>
              {comparisonBars.map((bar, i) => (
                <CompareBar key={i} label={bar.metric} yourPct={bar.voce} marketPct={bar.mercado} yourRaw={bar.raw} marketRef={bar.ref} />
              ))}
            </div>

            {/* Calculated Outputs */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 12 }}>
              <div style={{ background: COLORS.card, borderRadius: 8, padding: 16, border: "1px solid " + COLORS.border, textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: COLORS.gold }}>{docsEstimado.toLocaleString("pt-BR")}</div>
                <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 4 }}>Docs estimados/mês</div>
                <div style={{ fontSize: 10, color: COLORS.textDim }}>({entregas.toLocaleString("pt-BR")} × 6 docs)</div>
              </div>
              <div style={{ background: COLORS.card, borderRadius: 8, padding: 16, border: "1px solid " + COLORS.border, textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: COLORS.red }}>{Math.round(horasManualMes).toLocaleString("pt-BR")}h</div>
                <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 4 }}>Horas processamento/mês</div>
                <div style={{ fontSize: 10, color: COLORS.textDim }}>{usaTMS ? "0,5" : "3"} min/doc estimado</div>
              </div>
              <div style={{ background: COLORS.card, borderRadius: 8, padding: 16, border: "1px solid " + COLORS.border, textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 800, color: COLORS.green }}>R$ {Math.round(potencialEconomia).toLocaleString("pt-BR")}</div>
                <div style={{ fontSize: 11, color: COLORS.textDim, marginTop: 4 }}>Economia potencial/mês</div>
                <div style={{ fontSize: 10, color: COLORS.textDim }}>estimativa conservadora</div>
              </div>
            </div>

            {/* Insight */}
            <InsightBox type={!usaTMS ? "critical" : "info"}>
              {!usaTMS
                ? "Sem TMS, sua operação de " + entregas.toLocaleString("pt-BR") + " entregas/mês gera ~" + docsEstimado.toLocaleString("pt-BR") + " documentos processados manualmente. São ~" + Math.round(horasManualMes).toLocaleString("pt-BR") + " horas/mês de trabalho que poderiam ser automatizadas. Com " + freteSpot + "% de frete spot, a auditoria manual está deixando passar cobranças indevidas. Todas as premissas são editáveis nos campos ao lado."
                : "Sua operação já usa TMS, mas com score de complexidade " + complexityScore + ", ainda há espaço para otimização. Com " + transportadoras + " transportadoras e " + freteSpot + "% de frete spot, a auditoria e o controle de SLA são os pontos de maior ganho."}
            </InsightBox>

            <div style={{ fontSize: 11, color: COLORS.textDim, padding: "8px 12px", background: COLORS.gold + "0a", borderRadius: 6, border: "1px solid " + COLORS.gold + "22" }}>
              <strong style={{ color: COLORS.gold }}>Premissas:</strong> Docs estimados = entregas × 6 (NF-e + CT-e + MDF-e + CIOT + comprovante + auditoria). Tempo por doc: 3 min (manual) ou 0,5 min (TMS). Economia = entregas × R$ 2,80 (sem TMS) ou R$ 0,80 (com TMS). Valores são estimativas e podem ser ajustados.
            </div>
          </div>
        </div>
      </div>
    );
  };

  // ── LACUNAS ──
  const renderLacunas = () => (
    <div>
      <SectionTitle sub="Transparência sobre o que sabemos, o que estimamos e onde os dados precisam ser fortalecidos.">Metodologia, Fontes e Lacunas</SectionTitle>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 32 }}>
        <div style={{ background: COLORS.card, borderRadius: 10, padding: 24, border: `1px solid ${COLORS.border}` }}>
          <h3 style={{ fontSize: 16, fontWeight: 700, color: COLORS.text, marginBottom: 16 }}>Fontes Utilizadas</h3>
          {[
            { name: "ANTT/RNTRC", type: "Governo Federal", url: "gov.br/antt", data: "Transportadores, concessões, frota registrada", year: "2024/2025" },
            { name: "ABComm", type: "Associação setorial", url: "abcomm.org", data: "E-commerce: faturamento, pedidos, crescimento", year: "2025" },
            { name: "Edenred IFR", type: "Privada (índice público)", url: "edenred.com.br", data: "Índice de Frete Rodoviário", year: "2024-2026" },
            { name: "ANP", type: "Governo Federal", url: "gov.br/anp", data: "Preço de diesel", year: "2024-2026" },
            { name: "Receita Federal / Portal CT-e", type: "Governo Federal", url: "cte.fazenda.gov.br", data: "CT-e emitidos, emissores ativos", year: "2007-2026" },
            { name: "SENATRAN", type: "Governo Federal", url: "gov.br/senatran", data: "Frota de veículos por tipo", year: "2024" },
            { name: "CNT", type: "Confederação", url: "cnt.org.br", data: "Condição de rodovias, custos de transporte", year: "2025" },
          ].map((s, i) => (
            <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${COLORS.border}`, fontSize: 12 }}>
              <div>
                <div style={{ fontWeight: 600, color: COLORS.text }}>{s.name}</div>
                <div style={{ color: COLORS.textDim }}>{s.data}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ color: COLORS.textDim }}>{s.type}</div>
                <div style={{ color: COLORS.accentLight }}>{s.year}</div>
              </div>
            </div>
          ))}
        </div>

        <div style={{ background: COLORS.card, borderRadius: 10, padding: 24, border: `1px solid ${COLORS.border}` }}>
          <h3 style={{ fontSize: 16, fontWeight: 700, color: COLORS.text, marginBottom: 16 }}>Lacunas Identificadas</h3>
          {GAPS_ANALYSIS.map((g, i) => (
            <div key={i} style={{ marginBottom: 14, paddingBottom: 14, borderBottom: `1px solid ${COLORS.border}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: COLORS.text }}>{g.area}</span>
                <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 4, fontWeight: 600, background: g.severity === "high" ? `${COLORS.red}22` : g.severity === "medium" ? `${COLORS.gold}22` : `${COLORS.green}22`, color: g.severity === "high" ? COLORS.red : g.severity === "medium" ? COLORS.gold : COLORS.green }}>
                  {g.status}
                </span>
              </div>
              <div style={{ fontSize: 11, color: COLORS.textDim, lineHeight: 1.5 }}>{g.detail}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ background: COLORS.card, borderRadius: 10, padding: 24, border: `1px solid ${COLORS.border}`, marginBottom: 32 }}>
        <h3 style={{ fontSize: 16, fontWeight: 700, color: COLORS.text, marginBottom: 16 }}>Como tornar esta análise mais robusta — Próximos passos</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 16 }}>
          {[
            { title: "Série SENATRAN por UF", desc: "Extrair frota mensal por estado diretamente do SENATRAN. Substituiria estimativas por dados oficiais.", effort: "Baixo", impact: "Alto" },
            { title: "RNTRC série histórica", desc: "Extrair registros mensais de transportadores (2015-2026) do portal ANTT open data.", effort: "Médio", impact: "Alto" },
            { title: "CT-e série anual", desc: "Solicitar à Receita Federal ou estimar via emissores ativos × média de emissão.", effort: "Médio", impact: "Médio" },
            { title: "Diesel ANP semanal", desc: "Automatizar coleta da série semanal de preços de diesel via API/scraping da ANP.", effort: "Baixo", impact: "Médio" },
            { title: "% custo logístico por setor (ILOS)", desc: "Obter dados do ILOS para converter receita setorial em gasto com transporte.", effort: "Alto", impact: "Alto" },
            { title: "E-commerce por UF (Neotrust)", desc: "Solicitar dados regionais da Neotrust ou Ebit|Nielsen para substituir estimativas.", effort: "Médio", impact: "Alto" },
          ].map((item, i) => (
            <div key={i} style={{ background: `${COLORS.accent}08`, borderRadius: 8, padding: 14 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: COLORS.text, marginBottom: 6 }}>{item.title}</div>
              <div style={{ fontSize: 11, color: COLORS.textDim, marginBottom: 8, lineHeight: 1.5 }}>{item.desc}</div>
              <div style={{ display: "flex", gap: 8 }}>
                <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 3, background: `${COLORS.accent}22`, color: COLORS.accentLight }}>Esforço: {item.effort}</span>
                <span style={{ fontSize: 10, padding: "2px 6px", borderRadius: 3, background: `${COLORS.green}22`, color: COLORS.green }}>Impacto: {item.impact}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{ background: `${COLORS.gold}08`, borderRadius: 10, padding: 20, border: `1px solid ${COLORS.gold}33`, fontSize: 12, color: COLORS.textMuted, lineHeight: 1.7 }}>
        <strong style={{ color: COLORS.gold }}>Disclaimer:</strong> Esta análise utiliza dados públicos agregados e estimativas metodológicas. Valores por estado e por vertical incluem projeções baseadas em proporções regionais. ROI de TMS são faixas baseadas em benchmarks de mercado, não em estudo controlado. Para decisões de investimento, recomenda-se validação com dados primários. Última atualização: abril de 2026.
      </div>
    </div>
  );

  // ── MAIN RENDER ──
  return (
    <div style={{ background: COLORS.bg, minHeight: "100vh", color: COLORS.text, fontFamily: "'Plus Jakarta Sans', -apple-system, sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

      {/* HERO */}
      <div style={{ padding: "48px 32px 32px", maxWidth: 1280, margin: "0 auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
          <svg width="26" height="30" viewBox="0 0 52 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M26 0L52 15V45L26 60L0 45V15L26 0Z" fill="#F472B6"/>
            <path d="M26 0L52 15L26 30L0 15L26 0Z" fill="#FBCFE8"/>
            <path d="M26 30L52 15V45L26 60V30Z" fill="#DB2777"/>
            <path d="M26 30L0 15V45L26 60V30Z" fill="#EC4899"/>
          </svg>
          <span style={{ fontSize: 18, fontWeight: 800, color: COLORS.text, letterSpacing: "-0.03em" }}>emiteaí</span>
          <span style={{ fontSize: 11, fontWeight: 600, color: COLORS.pink, textTransform: "uppercase", letterSpacing: "0.08em", padding: "3px 10px", background: COLORS.pink + "15", borderRadius: 4, marginLeft: 4 }}>Inteligência de Mercado</span>
        </div>
        <h1 style={{ fontSize: 38, fontWeight: 800, color: COLORS.text, lineHeight: 1.15, letterSpacing: "-0.03em", maxWidth: 800, marginBottom: 12 }}>
          Raio-X da Logística Brasileira
        </h1>
        <p style={{ fontSize: 15, color: COLORS.textDim, maxWidth: 700, lineHeight: 1.7, marginBottom: 8 }}>
          Dados públicos sobre frota, transportadores, e-commerce, custos de frete, complexidade documental e oportunidade de digitalização por estado e vertical.
        </p>
        <p style={{ fontSize: 12, color: COLORS.textDim }}>
          Fontes: ANTT · ABComm · Edenred IFR · ANP · Receita Federal · SENATRAN · CNT &nbsp;|&nbsp; Atualizado em abril de 2026
        </p>
      </div>

      {/* NAV + CONTENT */}
      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "0 32px 64px" }}>
        {renderNav()}

        {activeSection === "panorama" && renderPanorama()}
        {activeSection === "estados" && renderEstados()}
        {activeSection === "verticais" && renderVerticais()}
        {activeSection === "custos" && renderCustos()}
        {activeSection === "documentos" && renderDocumentos()}
        {activeSection === "compare" && renderCompare()}
        {activeSection === "lacunas" && renderLacunas()}
      </div>

      {/* CTA */}
      <div style={{ background: "linear-gradient(135deg, #1E1B4B 0%, #4338CA 50%, #7C3AED 100%)", padding: "56px 32px", textAlign: "center" }}>
        <div style={{ maxWidth: 600, margin: "0 auto" }}>
          <img src={LOGO_WHITE} alt="emiteaí" style={{ height: 44, marginBottom: 16, mixBlendMode: "screen" }} />
          <h2 style={{ fontSize: 24, fontWeight: 800, color: "#FFFFFF", marginBottom: 12 }}>Quer entender onde sua operação está perdendo visibilidade, tempo e margem?</h2>
          <p style={{ fontSize: 14, color: "#C4BDE8", marginBottom: 24, lineHeight: 1.7 }}>
            Use os dados do mercado como ponto de partida. Receba um diagnóstico aplicado à sua operação de transporte.
          </p>
          <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
            <button style={{ padding: "14px 32px", background: "#F472B6", color: "#1E1B4B", border: "none", borderRadius: 24, fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
              Solicitar diagnóstico
            </button>
            <button style={{ padding: "14px 32px", background: "transparent", color: "#FFFFFF", border: "2px solid rgba(255,255,255,0.3)", borderRadius: 24, fontWeight: 600, fontSize: 14, cursor: "pointer" }}>
              Falar com especialista
            </button>
          </div>
        </div>
      </div>

      {/* FOOTER */}
      <div style={{ padding: "24px 32px", textAlign: "center", fontSize: 11, color: COLORS.textDim, borderTop: "1px solid " + COLORS.border }}>
        Dados públicos agregados · Estimativas metodológicas sinalizadas · Não constitui recomendação de investimento<br />
        © 2026 Emiteaí — Plataforma de Gestão de Transporte · emiteai.com.br
      </div>
    </div>
  );
}


        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(Dashboard));
    </script>
